name: Generate and Deploy Schema Graph

on:
  schedule:
    - cron: '30 1 * * *'  # 매일 10:30 KST (01:30 UTC)
  workflow_dispatch:       # 수동 트리거

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to GCP
        env:
          GOOGLE_ADC_JSON: ${{ secrets.GOOGLE_ADC_JSON }}
        run: |
          echo "$GOOGLE_ADC_JSON" > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: Generate index.html
        run: python3 generate_schema_graph.py || echo "BQ 조회 실패 — 기존 index.html로 배포합니다."

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
