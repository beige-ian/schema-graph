name: Generate and Deploy Schema Graph

on:
  schedule:
    - cron: '30 1 * * *'  # 매일 10:30 KST (01:30 UTC)
  workflow_dispatch:       # 수동 트리거
  push:
    branches:
      - main               # main 브랜치 push 시 자동 배포

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to GCP
        env:
          GOOGLE_ADC_JSON: ${{ secrets.GOOGLE_ADC_JSON }}
        run: |
          echo "$GOOGLE_ADC_JSON" > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: Generate index.html
        run: python3 generate_schema_graph.py || echo "BQ 조회 실패 — 기존 index.html로 배포합니다."

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy
          cp index.html _deploy/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
